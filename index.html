<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Cheatah"/>
<meta name="theme-color" content="#080808"/>
<title>Cheatah 🐆</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --black:#080808;--white:#f0ede6;--yellow:#f5d247;--ydim:rgba(245,210,71,.1);
  --grey:#161616;--mid:#252525;--muted:#555;--red:#e0533a;--green:#4caf7d;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:15px;-webkit-font-smoothing:antialiased;}

.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--black);}
.screen.active{display:flex;}

/* ══ HOME ══ */
#home{
  padding-top:calc(var(--st) + 16px);
  padding-bottom:calc(var(--sb) + 16px);
  overflow-y:auto;align-items:stretch;
  background:radial-gradient(ellipse 90% 40% at 70% 0%,rgba(245,210,71,.06),transparent 60%),var(--black);
}
.home-inner{padding:0 22px;display:flex;flex-direction:column;align-items:center;}
.logo{font-size:82px;font-weight:900;color:var(--white);line-height:1;text-align:center;margin:20px 0 6px;letter-spacing:-2px;}
.logo em{color:var(--yellow);font-style:normal;}
.eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--yellow);margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.65;margin-bottom:32px;}
.slabel{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#333;margin-bottom:9px;align-self:flex-start;width:100%;}

.mode-row{display:flex;gap:9px;width:100%;margin-bottom:26px;}
.mbtn{flex:1;border:1.5px solid var(--mid);border-radius:10px;padding:13px 8px;background:transparent;cursor:pointer;text-align:center;transition:all .18s;}
.mbtn.on{border-color:var(--yellow);background:var(--ydim);}
.mbtn-t{font-size:13px;font-weight:700;color:var(--muted);display:block;margin-bottom:2px;}
.mbtn.on .mbtn-t{color:var(--yellow);}
.mbtn-s{font-size:11px;color:#333;display:block;}
.mbtn.on .mbtn-s{color:#6e6030;}

.chips{display:flex;flex-wrap:wrap;gap:7px;width:100%;margin-bottom:26px;}
.chip{border:1.5px solid var(--mid);border-radius:20px;padding:6px 13px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .18s;}
.chip.on{border-color:var(--yellow);background:var(--ydim);color:var(--yellow);}

.keybox{width:100%;background:#111;border:1.5px solid var(--mid);border-radius:10px;display:flex;align-items:center;padding:4px 4px 4px 13px;margin-bottom:7px;transition:border-color .2s;}
.keybox:focus-within{border-color:var(--yellow);}
.keyinput{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-size:13px;padding:10px 0;font-family:'Courier New',monospace;}
.keyinput::placeholder{color:#2e2e2e;}
.keytog{background:var(--mid);border:none;border-radius:7px;padding:9px 11px;color:var(--muted);font-size:15px;cursor:pointer;}
.keyhint{font-size:11px;color:#2a2a2a;margin-bottom:26px;align-self:flex-start;}

.airow{display:flex;gap:8px;width:100%;margin-bottom:18px;}
.aibtn{flex:1;border:1.5px solid var(--mid);border-radius:10px;padding:10px 6px;background:transparent;cursor:pointer;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.aibtn.on{border-color:var(--yellow);background:var(--ydim);}
.aibtn-icon{font-size:20px;}
.aibtn-name{font-size:11px;font-weight:700;color:var(--muted);}
.aibtn.on .aibtn-name{color:var(--yellow);}
.aibtn-free{font-size:9px;color:#3a3a3a;border:1px solid #2a2a2a;border-radius:8px;padding:1px 5px;}
.aibtn.on .aibtn-free{color:#6e6030;border-color:#4a4020;}
.getkey-link{font-size:11px;color:#444;margin-bottom:22px;align-self:flex-start;text-decoration:underline;cursor:pointer;}
.getkey-link:active{color:var(--yellow);}

.scanbtn{width:100%;background:var(--yellow);border:none;border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:20px;font-weight:900;color:var(--black);letter-spacing:.1em;cursor:pointer;transition:all .15s;margin-bottom:10px;}
.scanbtn:active{transform:scale(.97);background:#fce050;}
.scanbtn:disabled{opacity:.3;pointer-events:none;}
.upload-btn{width:100%;background:transparent;border:1.5px solid var(--mid);border-radius:12px;padding:15px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;margin-bottom:24px;}
.upload-btn:active{border-color:var(--yellow);color:var(--yellow);}

/* ══ CAMERA ══ */
#camera{background:#000;position:relative;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;-webkit-transform:translateZ(0);transform:translateZ(0);}
#cam-canvas{display:none;}

.cam-top{position:absolute;top:0;left:0;right:0;padding:calc(var(--st) + 12px) 20px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);z-index:10;}
.cam-bot{position:absolute;bottom:0;left:0;right:0;padding:20px 40px calc(var(--sb) + 36px);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);z-index:10;}

.circ{width:44px;height:44px;border-radius:22px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(8px);}

.frame-box{position:absolute;top:50%;left:50%;width:82vw;height:calc(82vw * 1.35);transform:translate(-50%,-55%);pointer-events:none;z-index:5;}
.fc{position:absolute;width:26px;height:26px;border-color:var(--yellow);border-style:solid;border-width:0;}
.fc.tl{top:0;left:0;border-top-width:3px;border-left-width:3px;border-radius:3px 0 0 0;}
.fc.tr{top:0;right:0;border-top-width:3px;border-right-width:3px;border-radius:0 3px 0 0;}
.fc.bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 3px;}
.fc.br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 3px 0;}
.frame-hint{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap;letter-spacing:.08em;}

.shutter{width:74px;height:74px;border-radius:37px;border:3px solid var(--yellow);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.shutter:active .si{transform:scale(.9);background:#fce050;}
.si{width:58px;height:58px;border-radius:29px;background:var(--yellow);transition:all .1s;}

.mode-pill{background:rgba(0,0,0,.5);border:1px solid rgba(245,210,71,.3);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:#f5d247;}

#solving{position:absolute;inset:0;background:rgba(8,8,8,.82);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;backdrop-filter:blur(6px);}
#solving.show{display:flex;}
.solve-cheetah{font-size:52px;animation:bob .6s ease-in-out infinite alternate;}
@keyframes bob{from{transform:scale(1)}to{transform:scale(1.15)}}
.solve-label{font-size:17px;font-weight:700;color:var(--yellow);letter-spacing:.12em;}
.solve-sub{font-size:12px;color:var(--muted);}

/* ══ RESULTS ══ */
#results{padding-top:calc(var(--st) + 0px);}
.res-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #181818;flex-shrink:0;}
.res-title{font-size:14px;font-weight:700;color:var(--yellow);}
.res-acts{display:flex;gap:8px;}
.rib{background:var(--grey);border:1px solid var(--mid);border-radius:8px;padding:7px 11px;font-size:13px;cursor:pointer;color:var(--muted);}
.rib:active{border-color:var(--yellow);color:var(--yellow);}

.tabs{display:flex;border-bottom:1px solid #181818;flex-shrink:0;}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;color:#444;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--yellow);border-bottom-color:var(--yellow);}
.tcontent{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tpane{display:none;padding:16px;}
.tpane.on{display:block;}

.acard{background:var(--grey);border:1px solid #222;border-radius:10px;padding:15px;margin-bottom:11px;}
.ahead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.anum{background:var(--yellow);color:var(--black);font-size:10px;font-weight:900;padding:3px 8px;border-radius:4px;letter-spacing:.06em;}
.aconf{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;}
.ch{background:rgba(76,175,125,.15);color:var(--green);}
.cm{background:rgba(245,210,71,.12);color:var(--yellow);}
.cl{background:rgba(224,83,58,.12);color:var(--red);}
.acopy{margin-left:auto;background:transparent;border:1px solid #282828;border-radius:6px;padding:4px 9px;font-size:11px;color:#444;cursor:pointer;}
.acopy:active{border-color:var(--yellow);color:var(--yellow);}
.aq{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:9px;line-height:1.5;}
.aans{background:#0f0f0f;border-radius:7px;padding:12px;border-left:2.5px solid var(--yellow);}
.aansl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#2e2e2e;margin-bottom:5px;}
.aanst{font-size:14px;color:var(--white);line-height:1.65;}

.owrap{position:relative;border-radius:10px;overflow:hidden;background:#111;margin-bottom:14px;}
#rimg{width:100%;display:block;}
.pin{position:absolute;left:3%;background:rgba(245,210,71,.93);padding:3px 8px;border-radius:4px;max-width:60%;transform:translateY(-50%);}
.pin p{font-size:9px;font-weight:700;color:#080808;line-height:1.3;}

.savebtn{width:100%;background:var(--yellow);border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:900;color:var(--black);letter-spacing:.08em;cursor:pointer;margin-bottom:10px;}
.savebtn:active{background:#fce050;}
.sharebtn{width:100%;background:transparent;border:1.5px solid var(--mid);border-radius:10px;padding:14px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;margin-bottom:10px;}
.sharebtn:active{border-color:var(--yellow);color:var(--yellow);}

#toast{position:fixed;bottom:calc(var(--sb) + 22px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--grey);border:1px solid var(--yellow);border-radius:8px;padding:10px 20px;font-size:13px;color:var(--yellow);z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="home">
<div class="home-inner">
  <p class="eyebrow">// AI Exam Solver</p>
  <h1 class="logo">CHEAT<em>AH</em></h1>
  <p class="sub">Point your camera at any test.<br>Get every answer instantly.</p>

  <p class="slabel">Mode</p>
  <div class="mode-row">
    <button class="mbtn on" id="btn-test" onclick="setMode('test')">
      <span class="mbtn-t">⚡ Test Mode</span>
      <span class="mbtn-s">Fast answers only</span>
    </button>
    <button class="mbtn" id="btn-study" onclick="setMode('study')">
      <span class="mbtn-t">📚 Study Mode</span>
      <span class="mbtn-s">Full explanations</span>
    </button>
  </div>

  <p class="slabel">Subject</p>
  <div class="chips" id="chips"></div>


  <button class="scanbtn" id="scanbtn" onclick="openCamera()">
    <span>📷</span><span>SCAN TEST</span>
  </button>
  <button class="upload-btn" onclick="document.getElementById('fup').click()">
    <span>🖼</span><span>Upload Photo Instead</span>
  </button>
  <input type="file" id="fup" accept="image/*" style="display:none" onchange="handleUpload(event)"/>
</div>
</div>

<!-- ══ CAMERA ══ -->
<div class="screen" id="camera">
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="cam-canvas"></canvas>

  <div class="cam-top">
    <div class="circ" onclick="closeCamera()">✕</div>
    <div class="mode-pill" id="mode-pill">⚡ Test Mode</div>
    <div class="circ" id="flash-btn" onclick="toggleFlash()">🔦</div>
  </div>

  <div class="frame-box">
    <div class="fc tl"></div><div class="fc tr"></div>
    <div class="fc bl"></div><div class="fc br"></div>
    <p class="frame-hint">Align test paper within frame</p>
  </div>

  <div class="cam-bot">
    <div class="circ" onclick="flipCamera()">🔄</div>
    <button class="shutter" onclick="capture()" id="shutter"><div class="si"></div></button>
    <div style="width:44px"></div>
  </div>

  <div id="solving">
    <div class="solve-cheetah">🐆</div>
    <p class="solve-label">SOLVING…</p>
    <p class="solve-sub">AI is reading your test</p>
  </div>
</div>

<!-- ══ RESULTS ══ -->
<div class="screen" id="results">
  <div class="res-top">
    <span class="res-title" id="res-title">🐆 Answers</span>
    <div class="res-acts">
      <button class="rib" onclick="rescan()">📷 Rescan</button>
      <button class="rib" onclick="goHome()">🏠</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('answers')">Answers</div>
    <div class="tab"    onclick="switchTab('overlay')">Overlay</div>
  </div>
  <div class="tcontent">
    <div class="tpane on" id="pane-answers">
      <div id="alist"></div>
      <button class="sharebtn" onclick="shareAll()">⬆ Share All Answers</button>
    </div>
    <div class="tpane" id="pane-overlay">
      <div class="owrap">
        <img id="rimg" src="" alt=""/>
        <div id="pins"></div>
      </div>
      <button class="savebtn" onclick="saveImage()">⬇ Save Image to Photos</button>
      <button class="sharebtn" onclick="shareAll()">⬆ Share Answers as Text</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
let mode       = 'test';
let subject    = 'general';
let stream     = null;
let facing     = 'environment';
let flashOn    = false;
let answers    = [];
let imgDataUrl = null;

const SUBJECTS = [
  {v:'general',l:'🧠 General'},{v:'math',l:'📐 Math'},{v:'bio',l:'🧬 AP Bio'},
  {v:'chem',l:'⚗️ Chem'},{v:'history',l:'📜 History'},{v:'english',l:'📖 English'},
  {v:'physics',l:'🔭 Physics'},{v:'sat',l:'✏️ SAT/ACT'},
];
const PROMPTS = {
  general:'',
  math:'Answer like a perfect math student. Show concise steps.',
  bio:'Answer like a perfect AP Biology student. Use precise scientific terminology.',
  chem:'Answer like a perfect chemistry student. Show formulas and balance equations.',
  history:'Answer like a perfect history student. Reference key dates, people, and causes.',
  english:'Answer like a perfect English student. Quote text evidence where relevant.',
  physics:'Answer like a perfect physics student. Show formulas, units, and numeric steps.',
  sat:'Answer in SAT/ACT format. For multiple choice, state the letter and a one-line reason.',
};

// ── INIT ───────────────────────────────────────────────────────────
(function(){
  const wrap = document.getElementById('chips');
  SUBJECTS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'chip' + (s.v==='general'?' on':'');
    b.textContent = s.l;
    b.onclick = () => {
      subject = s.v;
      wrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
    };
    wrap.appendChild(b);
  });

})();

// ── UI HELPERS ─────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg,dur=2600){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setMode(m){
  mode=m;
  document.getElementById('btn-test').classList.toggle('on',m==='test');
  document.getElementById('btn-study').classList.toggle('on',m==='study');
  document.getElementById('mode-pill').textContent=m==='test'?'⚡ Test Mode':'📚 Study Mode';
}

// ── CAMERA ─────────────────────────────────────────────────────────
async function openCamera(){
  show('camera');
  await startStream();
}
async function startStream(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  try{
    // Safari-safe constraints — avoid high res which blocks on iPhone
    const constraints={
      video:{
        facingMode:{ideal:facing},
        width:{ideal:1280},
        height:{ideal:720}
      },
      audio:false
    };
    stream=await navigator.mediaDevices.getUserMedia(constraints);
    const video=document.getElementById('video');
    video.setAttribute('autoplay','');
    video.setAttribute('playsinline','');
    video.setAttribute('muted','');
    video.srcObject=stream;
    // Safari requires explicit play() call
    try{await video.play();}catch(pe){console.log('play err',pe);}
  }catch(e){
    toast('Camera error: '+e.message);
    show('home');
  }
}
function closeCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  show('home');
}
async function flipCamera(){
  facing=facing==='environment'?'user':'environment';
  await startStream();
}
function toggleFlash(){
  flashOn=!flashOn;
  document.getElementById('flash-btn').textContent=flashOn?'💡':'🔦';
  if(stream){
    const track=stream.getVideoTracks()[0];
    if(track&&track.getCapabilities&&track.getCapabilities().torch){
      track.applyConstraints({advanced:[{torch:flashOn}]}).catch(()=>{});
    }
  }
  toast(flashOn?'Flash on':'Flash off');
}
async function capture(){
  const video=document.getElementById('video');
  const canvas=document.getElementById('cam-canvas');
  canvas.width=video.videoWidth||1280;
  canvas.height=video.videoHeight||720;
  canvas.getContext('2d').drawImage(video,0,0);
  imgDataUrl=canvas.toDataURL('image/jpeg',0.85);
  await solve(imgDataUrl);
}
function handleUpload(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{imgDataUrl=ev.target.result;show('camera');await solve(imgDataUrl);};
  reader.readAsDataURL(file);
}

// ── AI SOLVE ───────────────────────────────────────────────────────
async function solve(dataUrl){
  document.getElementById('solving').classList.add('show');
  document.getElementById('shutter').disabled=true;

  const modeNote=mode==='study'
    ?'For each question provide the answer, a full step-by-step explanation, and confidence %.'
    :'For each question give ONLY the direct answer — no explanation. Include confidence %.';
  const system=`You are Cheatah, an AI that reads test/exam images and answers every question.
${PROMPTS[subject]||''}
Format strictly as:
Q1. [question text]
Answer: [answer]
Confidence: [0-100]%

Repeat for every question visible. ${modeNote}`;

  try{
    const base64=dataUrl.split(',')[1];
    const mtype=dataUrl.split(';')[0].split(':')[1];
    const res=await fetch('/api/solve',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        imageBase64:base64,
        mimeType:mtype,
        subject,
        mode
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const text=data.text||'';
    answers=parseAnswers(text);
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    renderResults();
    show('results');
  }catch(e){
    toast('⚠ '+(e.message||'Something went wrong'));
  }finally{
    document.getElementById('solving').classList.remove('show');
    document.getElementById('shutter').disabled=false;
  }
}

// ── PARSE ──────────────────────────────────────────────────────────
function parseAnswers(text){
  const lines=text.split('\n').filter(l=>l.trim());
  const out=[];let cur=null;
  for(const line of lines){
    const qm=line.match(/^(?:Q(?:uestion)?\s*(\d+)[.:)]|(\d+)[.)]\s)/i);
    if(qm){
      if(cur)out.push(cur);
      cur={num:parseInt(qm[1]||qm[2]),question:line.replace(/^(?:Q(?:uestion)?\s*\d+[.:)]|\d+[.)]\s)/i,'').trim(),answer:'',confidence:null};
    }else if(line.match(/^(?:Answer|A)[.:)]/i)&&cur){
      cur.answer=line.replace(/^(?:Answer|A)[.:)]\s*/i,'').trim();
    }else if(line.match(/confidence[:\s]+(\d+)%/i)&&cur){
      cur.confidence=parseInt(line.match(/(\d+)%/)[1]);
    }else if(cur){
      if(!cur.answer)cur.answer=line.trim();
      else cur.answer+=' '+line.trim();
    }
  }
  if(cur)out.push(cur);
  return out.length?out:[{num:1,question:'',answer:text,confidence:null}];
}

// ── RENDER ─────────────────────────────────────────────────────────
function renderResults(){
  document.getElementById('res-title').textContent=`🐆 ${answers.length} answer${answers.length!==1?'s':''} found`;

  document.getElementById('alist').innerHTML=answers.map((a,i)=>{
    let conf='';
    if(a.confidence!==null){
      const cls=a.confidence>=80?'ch':a.confidence>=60?'cm':'cl';
      conf=`<span class="aconf ${cls}">${a.confidence}% sure</span>`;
    }
    return `<div class="acard">
      <div class="ahead">
        <span class="anum">Q${a.num}</span>${conf}
        <button class="acopy" onclick="copyOne(${i},this)">⎘ Copy</button>
      </div>
      ${a.question?`<p class="aq">${esc(a.question)}</p>`:''}
      <div class="aans"><p class="aansl">Answer</p><p class="aanst">${esc(a.answer)}</p></div>
    </div>`;
  }).join('');

  document.getElementById('rimg').src=imgDataUrl;
  document.getElementById('pins').innerHTML=answers.map((a,i)=>{
    const top=6+(i/Math.max(answers.length,1))*82;
    const label=`Q${a.num}: ${a.answer.slice(0,52)}${a.answer.length>52?'…':''}`;
    return `<div class="pin" style="top:${top}%"><p>${esc(label)}</p></div>`;
  }).join('');
}

// ── TABS ───────────────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['answers','overlay'][i]===name));
  document.getElementById('pane-answers').classList.toggle('on',name==='answers');
  document.getElementById('pane-overlay').classList.toggle('on',name==='overlay');
}

// ── ACTIONS ────────────────────────────────────────────────────────
function copyOne(i,btn){
  const a=answers[i];
  const text=`Q${a.num}: ${a.question}\nAnswer: ${a.answer}`;
  navigator.clipboard?.writeText(text).then(()=>{btn.textContent='✓ Copied';setTimeout(()=>btn.textContent='⎘ Copy',1500);});
}
function shareAll(){
  const text='🐆 Cheatah Answers\n\n'+
    answers.map(a=>`Q${a.num}: ${a.question}\nAnswer: ${a.answer}${a.confidence?`\nConfidence: ${a.confidence}%`:''}`).join('\n\n');
  if(navigator.share){navigator.share({title:'Cheatah Answers',text}).catch(()=>{});}
  else{navigator.clipboard?.writeText(text).then(()=>toast('Copied to clipboard!'));}
}
function saveImage(){
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    canvas.width=img.width;canvas.height=img.height;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    const scale=img.width/Math.max(document.getElementById('rimg').clientWidth,1);
    ctx.font=`bold ${Math.round(13*scale)}px -apple-system,sans-serif`;
    answers.forEach((a,i)=>{
      const topPct=0.06+(i/Math.max(answers.length,1))*0.82;
      const y=img.height*topPct;
      const x=img.width*0.03;
      const label=`Q${a.num}: ${a.answer.slice(0,52)}${a.answer.length>52?'…':''}`;
      const pad=8*scale;
      const tw=ctx.measureText(label).width;
      const bh=22*scale;
      ctx.fillStyle='rgba(245,210,71,0.93)';
      ctx.beginPath();
      if(ctx.roundRect){ctx.roundRect(x,y-bh/2,tw+pad*2,bh,4*scale);}
      else{ctx.rect(x,y-bh/2,tw+pad*2,bh);}
      ctx.fill();
      ctx.fillStyle='#080808';
      ctx.fillText(label,x+pad,y+5*scale);
    });
    const link=document.createElement('a');
    link.download=`cheatah-${Date.now()}.jpg`;
    link.href=canvas.toDataURL('image/jpeg',0.9);
    link.click();
    toast('✓ Image saved!');
  };
  img.src=imgDataUrl;
}
function rescan(){
  answers=[];imgDataUrl=null;
  show('camera');startStream();
}
function goHome(){
  answers=[];imgDataUrl=null;
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  show('home');
}
</script>

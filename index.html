<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Cheatah"/>
<meta name="theme-color" content="#080808"/>
<title>Cheatah 🐆</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --black:#080808;--white:#f0ede6;--yellow:#f5d247;--ydim:rgba(245,210,71,.12);
  --grey:#161616;--mid:#252525;--muted:#555;--red:#e0533a;--green:#4caf7d;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--black);}
.screen.active{display:flex;}

/* ══════════ HOME ══════════ */
#home{
  overflow-y:auto;
  padding-top:calc(var(--st) + 14px);
  background:radial-gradient(ellipse 80% 40% at 65% 0%,rgba(245,210,71,.07),transparent 55%),var(--black);
}
.home-inner{padding:0 24px calc(var(--sb) + 36px);display:flex;flex-direction:column;align-items:center;}
.eyebrow{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--yellow);margin-bottom:6px;}
.logo{font-size:80px;font-weight:900;color:var(--white);line-height:1;letter-spacing:-3px;text-align:center;margin-bottom:6px;}
.logo em{color:var(--yellow);font-style:normal;}
.sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;margin-bottom:36px;}

.slabel{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#333;margin-bottom:8px;align-self:flex-start;width:100%;}
.mode-row{display:flex;gap:9px;width:100%;margin-bottom:24px;}
.mbtn{flex:1;border:1.5px solid var(--mid);border-radius:10px;padding:12px 8px;background:transparent;cursor:pointer;text-align:center;transition:all .18s;}
.mbtn.on{border-color:var(--yellow);background:var(--ydim);}
.mbtn-t{font-size:13px;font-weight:700;color:var(--muted);display:block;margin-bottom:2px;}
.mbtn.on .mbtn-t{color:var(--yellow);}
.mbtn-s{font-size:11px;color:#333;display:block;}
.mbtn.on .mbtn-s{color:#6e6030;}
.chips{display:flex;flex-wrap:wrap;gap:7px;width:100%;margin-bottom:28px;}
.chip{border:1.5px solid var(--mid);border-radius:20px;padding:6px 13px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .18s;}
.chip.on{border-color:var(--yellow);background:var(--ydim);color:var(--yellow);}

.scanbtn{
  width:100%;background:var(--yellow);border:none;border-radius:14px;
  padding:22px 20px;display:flex;align-items:center;justify-content:center;gap:12px;
  font-size:21px;font-weight:900;color:var(--black);letter-spacing:.08em;cursor:pointer;
  transition:all .15s;margin-bottom:10px;
}
.scanbtn:active{transform:scale(.97);background:#fce050;}
.upload-btn{
  width:100%;background:transparent;border:1.5px solid var(--mid);border-radius:12px;
  padding:15px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;
}
.upload-btn:active{border-color:var(--yellow);color:var(--yellow);}

/* ══════════ CAMERA / LIVE VIEW ══════════ */
#live{background:#000;position:relative;}

/* video fills screen */
#video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:1;background:#000;
  -webkit-transform:translateZ(0);transform:translateZ(0);
}
#cam-canvas{display:none;}

/* top bar */
.live-top{
  position:fixed;top:0;left:0;right:0;
  padding:calc(var(--st) + 10px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
  z-index:20;
}
.ltop-close{width:40px;height:40px;border-radius:20px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;backdrop-filter:blur(10px);}
.ltop-badge{background:rgba(0,0,0,.55);border:1px solid rgba(245,210,71,.3);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--yellow);backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px;}
.ltop-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);}
.ltop-badge-dot.scanning{animation:blink .8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ltop-flip{width:40px;height:40px;border-radius:20px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;backdrop-filter:blur(10px);}

/* scan frame */
.frame{
  position:fixed;top:50%;left:50%;
  width:88vw;height:calc(88vw * 1.28);
  transform:translate(-50%,-54%);
  pointer-events:none;z-index:10;
}
.fc{position:absolute;width:24px;height:24px;border-color:rgba(245,210,71,.8);border-style:solid;border-width:0;}
.fc.tl{top:0;left:0;border-top-width:2.5px;border-left-width:2.5px;border-radius:2px 0 0 0;}
.fc.tr{top:0;right:0;border-top-width:2.5px;border-right-width:2.5px;border-radius:0 2px 0 0;}
.fc.bl{bottom:0;left:0;border-bottom-width:2.5px;border-left-width:2.5px;border-radius:0 0 0 2px;}
.fc.br{bottom:0;right:0;border-bottom-width:2.5px;border-right-width:2.5px;border-radius:0 0 2px 0;}

/* shutter button */
.live-bot{
  position:fixed;bottom:0;left:0;right:0;
  padding:0 32px calc(var(--sb) + 32px);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 100%);
  z-index:20;
  padding-top:20px;
}
.shutter{
  width:74px;height:74px;border-radius:37px;
  border:3px solid var(--yellow);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.shutter:active .si{transform:scale(.88);background:#fce050;}
.si{width:58px;height:58px;border-radius:29px;background:var(--yellow);transition:all .1s;}

/* auto toggle */
.auto-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.auto-lbl{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;}
.tog-track{width:42px;height:24px;border-radius:12px;background:#222;position:relative;transition:background .2s;border:1px solid #333;}
.tog-track.on{background:var(--yellow);border-color:var(--yellow);}
.tog-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:8px;background:#555;transition:transform .2s,background .2s;}
.tog-track.on .tog-thumb{transform:translateX(18px);background:var(--black);}
.auto-sub{font-size:10px;color:rgba(255,255,255,.3);}

/* flash capture effect */
.cap-flash{position:fixed;inset:0;background:rgba(245,210,71,.15);pointer-events:none;z-index:15;opacity:0;transition:opacity .1s;}
.cap-flash.show{opacity:1;}

/* ══════════ ANSWERS DRAWER ══════════ */
/* slides up from bottom over the camera */
#drawer{
  position:fixed;bottom:0;left:0;right:0;
  height:55vh;
  background:rgba(8,8,8,.96);
  border-top:1px solid #222;
  border-radius:20px 20px 0 0;
  z-index:30;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  backdrop-filter:blur(20px);
}
#drawer.open{transform:translateY(0);}

.drawer-handle{
  width:36px;height:4px;border-radius:2px;background:#333;
  margin:12px auto 0;flex-shrink:0;cursor:pointer;
}
.drawer-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px 10px;flex-shrink:0;border-bottom:1px solid #1a1a1a;
}
.drawer-title{font-size:14px;font-weight:700;color:var(--yellow);}
.drawer-close{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.drawer-close:active{color:var(--yellow);}
.drawer-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;}
.drawer-actions{padding:10px 16px calc(var(--sb) + 12px);border-top:1px solid #1a1a1a;display:flex;gap:8px;flex-shrink:0;}
.dact{flex:1;background:transparent;border:1px solid var(--mid);border-radius:10px;padding:12px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;}
.dact:active{border-color:var(--yellow);color:var(--yellow);}
.dact.hi{background:var(--yellow);color:var(--black);border-color:var(--yellow);}
.dact.hi:active{background:#fce050;}

/* answer cards in drawer */
.acard{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:13px;margin-bottom:9px;}
.ahead{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.anum{background:var(--yellow);color:var(--black);font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;}
.aconf{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.ch{background:rgba(76,175,125,.15);color:var(--green);}
.cm{background:rgba(245,210,71,.12);color:var(--yellow);}
.cl{background:rgba(224,83,58,.12);color:var(--red);}
.acopy{margin-left:auto;background:transparent;border:1px solid #242424;border-radius:6px;padding:3px 8px;font-size:11px;color:#444;cursor:pointer;}
.acopy:active{border-color:var(--yellow);color:var(--yellow);}
.aq{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:7px;line-height:1.5;}
.aans{background:#0a0a0a;border-radius:6px;padding:10px;border-left:2.5px solid var(--yellow);}
.aansl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#272727;margin-bottom:4px;}
.aanst{font-size:14px;color:var(--white);line-height:1.6;}

/* solving spinner inside drawer area */
#solving{
  position:fixed;inset:0;
  background:rgba(8,8,8,.8);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  z-index:25;backdrop-filter:blur(6px);
}
#solving.show{display:flex;}
.solve-leo{font-size:54px;animation:bob .55s ease-in-out infinite alternate;}
@keyframes bob{from{transform:scale(1)}to{transform:scale(1.18)}}
.solve-lbl{font-size:17px;font-weight:900;color:var(--yellow);letter-spacing:.12em;}
.solve-s{font-size:12px;color:var(--muted);}

/* ══════════ TOAST ══════════ */
#toast{
  position:fixed;bottom:calc(var(--sb) + 24px);left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--grey);border:1px solid var(--yellow);border-radius:8px;
  padding:10px 20px;font-size:13px;color:var(--yellow);
  z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="home">
<div class="home-inner">
  <p class="eyebrow">// AI Exam Solver</p>
  <h1 class="logo">CHEAT<em>AH</em></h1>
  <p class="sub">Point your camera at any test or screen.<br>Answers appear automatically.</p>

  <p class="slabel">Mode</p>
  <div class="mode-row">
    <button class="mbtn on" id="btn-test" onclick="setMode('test')">
      <span class="mbtn-t">⚡ Test Mode</span><span class="mbtn-s">Answers only</span>
    </button>
    <button class="mbtn" id="btn-study" onclick="setMode('study')">
      <span class="mbtn-t">📚 Study Mode</span><span class="mbtn-s">Full explanations</span>
    </button>
  </div>

  <p class="slabel">Subject</p>
  <div class="chips" id="chips"></div>

  <button class="scanbtn" onclick="openLive()">
    <span>📷</span><span>START SCANNING</span>
  </button>
  <button class="upload-btn" onclick="document.getElementById('fup').click()" style="margin-top:10px">
    <span>🖼</span><span>Upload a Photo Instead</span>
  </button>
  <input type="file" id="fup" accept="image/*" style="display:none" onchange="handleUpload(event)"/>
</div>
</div>

<!-- ══ LIVE CAMERA ══ -->
<div class="screen" id="live">
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="cam-canvas"></canvas>

  <div class="live-top">
    <div class="ltop-close" onclick="closeLive()">✕</div>
    <div class="ltop-badge" id="status-badge">
      <div class="ltop-badge-dot" id="badge-dot"></div>
      <span id="badge-text">Ready</span>
    </div>
    <div class="ltop-flip" onclick="flipCam()">🔄</div>
  </div>

  <div class="frame">
    <div class="fc tl"></div><div class="fc tr"></div>
    <div class="fc bl"></div><div class="fc br"></div>
  </div>

  <div class="live-bot">
    <!-- auto toggle -->
    <div class="auto-wrap" onclick="toggleAuto()">
      <span class="auto-lbl">Auto</span>
      <div class="tog-track" id="tog-track"><div class="tog-thumb"></div></div>
      <span class="auto-sub" id="auto-sub">off</span>
    </div>

    <!-- shutter -->
    <button class="shutter" id="shutter" onclick="captureNow()">
      <div class="si"></div>
    </button>

    <!-- flash toggle -->
    <div class="auto-wrap" onclick="toggleFlash()">
      <span class="auto-lbl">Flash</span>
      <div class="tog-track" id="flash-track"><div class="tog-thumb"></div></div>
      <span class="auto-sub" id="flash-sub">off</span>
    </div>
  </div>

  <div class="cap-flash" id="cap-flash"></div>
</div>

<!-- ══ ANSWERS DRAWER ══ -->
<div id="drawer">
  <div class="drawer-handle" onclick="toggleDrawer()"></div>
  <div class="drawer-top">
    <span class="drawer-title" id="drawer-title">🐆 Answers</span>
    <button class="drawer-close" onclick="toggleDrawer()">⌄</button>
  </div>
  <div class="drawer-scroll" id="drawer-scroll"></div>
  <div class="drawer-actions">
    <button class="dact" onclick="shareAnswers()">⬆ Share</button>
    <button class="dact" onclick="scanAgain()">📷 Scan Again</button>
    <button class="dact hi" onclick="copyAnswers()">⎘ Copy All</button>
  </div>
</div>

<!-- ══ SOLVING ══ -->
<div id="solving">
  <div class="solve-leo">🐆</div>
  <p class="solve-lbl">SOLVING…</p>
  <p class="solve-s">Reading your test</p>
</div>

<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
let mode     = 'test';
let subject  = 'general';
let stream   = null;
let facing   = 'environment';
let flashOn  = false;
let autoOn   = false;
let autoTimer= null;
let solving  = false;
let answers  = [];

const SUBJECTS=[
  {v:'general',l:'🧠 General'},{v:'math',l:'📐 Math'},{v:'bio',l:'🧬 AP Bio'},
  {v:'chem',l:'⚗️ Chem'},{v:'history',l:'📜 History'},{v:'english',l:'📖 English'},
  {v:'physics',l:'🔭 Physics'},{v:'sat',l:'✏️ SAT/ACT'}
];
const PROMPTS={
  general:'',
  math:'Answer like a perfect math student. Show concise steps.',
  bio:'Answer like a perfect AP Biology student. Use precise scientific terminology.',
  chem:'Answer like a perfect chemistry student. Show formulas and balance equations.',
  history:'Answer like a perfect history student. Reference key dates, people, and causes.',
  english:'Answer like a perfect English student. Quote text evidence where relevant.',
  physics:'Answer like a perfect physics student. Show formulas, units, and numeric steps.',
  sat:'Answer in SAT/ACT format. For multiple choice, state the letter and a one-line reason.'
};

// ── INIT ───────────────────────────────────────────────────────────
(function(){
  const wrap=document.getElementById('chips');
  SUBJECTS.forEach(s=>{
    const b=document.createElement('button');
    b.className='chip'+(s.v==='general'?' on':'');
    b.textContent=s.l;
    b.onclick=()=>{subject=s.v;wrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');};
    wrap.appendChild(b);
  });
})();

// ── UI ─────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg,dur=2400){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setMode(m){
  mode=m;
  document.getElementById('btn-test').classList.toggle('on',m==='test');
  document.getElementById('btn-study').classList.toggle('on',m==='study');
}
function setStatus(text,active=false){
  document.getElementById('badge-text').textContent=text;
  document.getElementById('badge-dot').classList.toggle('scanning',active);
}

// ── CAMERA ─────────────────────────────────────────────────────────
async function openLive(){
  show('live');
  await startStream();
}
async function startStream(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    const v=document.getElementById('video');
    v.srcObject=stream;
    v.muted=true;
    v.setAttribute('autoplay','');
    v.setAttribute('playsinline','');
    v.setAttribute('webkit-playsinline','');
    await new Promise(r=>setTimeout(r,200));
    try{await v.play();}catch(e){console.warn('play:',e);}
    setStatus('Ready');
  }catch(e){
    toast(e.name==='NotAllowedError'
      ?'⚠ Camera blocked — go to Settings → Safari → Camera → Allow'
      :'⚠ Camera error: '+e.message);
    show('home');
  }
}
function closeLive(){
  stopAuto();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  document.getElementById('drawer').classList.remove('open');
  show('home');
}
async function flipCam(){
  facing=facing==='environment'?'user':'environment';
  await startStream();
}
function toggleFlash(){
  flashOn=!flashOn;
  document.getElementById('flash-track').classList.toggle('on',flashOn);
  document.getElementById('flash-sub').textContent=flashOn?'on':'off';
  if(stream){
    const t=stream.getVideoTracks()[0];
    if(t?.getCapabilities?.()?.torch)
      t.applyConstraints({advanced:[{torch:flashOn}]}).catch(()=>{});
  }
}

// ── AUTO SCAN ──────────────────────────────────────────────────────
function toggleAuto(){
  autoOn=!autoOn;
  document.getElementById('tog-track').classList.toggle('on',autoOn);
  document.getElementById('auto-sub').textContent=autoOn?'8s':'off';
  if(autoOn){setStatus('Auto-scanning',true);scheduleNext();}
  else{stopAuto();setStatus('Ready',false);}
}
function scheduleNext(){
  stopAuto();
  autoTimer=setTimeout(async()=>{
    if(autoOn&&!solving){
      await captureNow();
      if(autoOn)scheduleNext();
    } else if(autoOn){
      scheduleNext();
    }
  },8000);
}
function stopAuto(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
}

// ── CAPTURE ────────────────────────────────────────────────────────
async function captureNow(){
  if(solving)return;
  const v=document.getElementById('video');
  if(!v.videoWidth){toast('⚠ Camera not ready yet');return;}

  // flash effect
  const fl=document.getElementById('cap-flash');
  fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),180);

  const dataUrl = await compressImage(v, 1280, 0.80);
  await solve(dataUrl);
}

// Compress any image source to max width and jpeg quality
function compressImage(source, maxW, quality){
  return new Promise(resolve=>{
    const c=document.getElementById('cam-canvas');
    let w = source.videoWidth || source.naturalWidth || source.width || 1280;
    let h = source.videoHeight || source.naturalHeight || source.height || 720;
    if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
    c.width=w; c.height=h;
    c.getContext('2d').drawImage(source,0,0,w,h);
    resolve(c.toDataURL('image/jpeg', quality));
  });
}

function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    show('live');
    await new Promise(r=>setTimeout(r,100));
    // compress uploaded image too
    const img=new Image();
    img.onload=async()=>{
      const dataUrl=await compressImage(img,1280,0.80);
      await solve(dataUrl);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function scanAgain(){
  toggleDrawer();
  setTimeout(()=>setStatus(autoOn?'Auto-scanning':'Ready',autoOn),400);
}

// ── SOLVE ──────────────────────────────────────────────────────────
async function solve(dataUrl){
  solving=true;
  setStatus('Solving…',true);
  document.getElementById('solving').classList.add('show');
  document.getElementById('shutter').disabled=true;

  const modeNote=mode==='study'
    ?'For each question provide the answer, a full step-by-step explanation, and confidence %.'
    :'For each question give ONLY the direct answer — no explanation. Include confidence %.';
  const system=`You are Cheatah, an AI that reads test/exam images and answers every question.
${PROMPTS[subject]||''}
Format strictly as:
Q1. [question text]
Answer: [answer]
Confidence: [0-100]%
Repeat for every question visible. ${modeNote}`;

  try{
    const base64=dataUrl.split(',')[1];
    const mtype=dataUrl.split(';')[0].split(':')[1];
    const res=await fetch('/api/solve',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageBase64:base64,mimeType:mtype,subject,mode})
    });
    // Show raw HTTP status for debugging
    if(!res.ok){
      const errText = await res.text();
      console.error('HTTP '+res.status, errText);
      throw new Error('HTTP '+res.status+': '+errText.slice(0,120));
    }
    const data=await res.json();
    console.log('API response:', JSON.stringify(data).slice(0,300));
    if(data.error)throw new Error(JSON.stringify(data.error));
    if(!data.text)throw new Error('No text returned. Full response: '+JSON.stringify(data).slice(0,200));
    answers=parseAnswers(data.text||'');
    renderDrawer();
    document.getElementById('drawer').classList.add('open');
    setStatus(`${answers.length} answers found`,false);
  }catch(e){
    console.error('Solve error:', e);
    toast('⚠ '+e.message, 6000);
    setStatus('Error — tap to retry',false);
  }finally{
    solving=false;
    document.getElementById('solving').classList.remove('show');
    document.getElementById('shutter').disabled=false;
  }
}

// ── PARSE ──────────────────────────────────────────────────────────
function parseAnswers(text){
  const lines=text.split('\n').filter(l=>l.trim());
  const out=[];let cur=null;
  for(const line of lines){
    const qm=line.match(/^(?:Q(?:uestion)?\s*(\d+)[.:)]|(\d+)[.)]\s)/i);
    if(qm){
      if(cur)out.push(cur);
      cur={num:parseInt(qm[1]||qm[2]),
           question:line.replace(/^(?:Q(?:uestion)?\s*\d+[.:)]|\d+[.)]\s)/i,'').trim(),
           answer:'',confidence:null};
    }else if(line.match(/^(?:Answer|A)[.:)]/i)&&cur){
      cur.answer=line.replace(/^(?:Answer|A)[.:)]\s*/i,'').trim();
    }else if(line.match(/confidence[:\s]+(\d+)%/i)&&cur){
      cur.confidence=parseInt(line.match(/(\d+)%/)[1]);
    }else if(cur){
      if(!cur.answer)cur.answer=line.trim();
      else cur.answer+=' '+line.trim();
    }
  }
  if(cur)out.push(cur);
  return out.length?out:[{num:1,question:'',answer:text,confidence:null}];
}

// ── RENDER DRAWER ──────────────────────────────────────────────────
function renderDrawer(){
  document.getElementById('drawer-title').textContent=
    `🐆 ${answers.length} answer${answers.length!==1?'s':''} found`;

  document.getElementById('drawer-scroll').innerHTML=answers.map((a,i)=>{
    let conf='';
    if(a.confidence!==null){
      const cls=a.confidence>=80?'ch':a.confidence>=60?'cm':'cl';
      conf=`<span class="aconf ${cls}">${a.confidence}%</span>`;
    }
    return `<div class="acard">
      <div class="ahead">
        <span class="anum">Q${a.num}</span>${conf}
        <button class="acopy" onclick="copyOne(${i},this)">⎘</button>
      </div>
      ${a.question?`<p class="aq">${esc(a.question)}</p>`:''}
      <div class="aans">
        <p class="aansl">Answer</p>
        <p class="aanst">${esc(a.answer)}</p>
      </div>
    </div>`;
  }).join('');
}

// ── DRAWER ─────────────────────────────────────────────────────────
function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
}

// ── ACTIONS ────────────────────────────────────────────────────────
function copyOne(i,btn){
  const a=answers[i];
  navigator.clipboard?.writeText(`Q${a.num}: ${a.question}\nAnswer: ${a.answer}`)
    .then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='⎘',1400);});
}
function copyAnswers(){
  const text=answers.map(a=>`Q${a.num}: ${a.question}\nAnswer: ${a.answer}`).join('\n\n');
  navigator.clipboard?.writeText(text).then(()=>toast('✓ All answers copied!'));
}
function shareAnswers(){
  const text='🐆 Cheatah Answers\n\n'+
    answers.map(a=>`Q${a.num}: ${a.question}\nAnswer: ${a.answer}${a.confidence?` (${a.confidence}% sure)`:''}`).join('\n\n');
  if(navigator.share)navigator.share({title:'Cheatah Answers',text}).catch(()=>{});
  else navigator.clipboard?.writeText(text).then(()=>toast('Copied!'));
}
</script>
